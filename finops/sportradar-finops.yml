specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Sportradar
providerId: sportradar
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Sports Data
  - Media
  - FinOps
  - FOCUS
description: FOCUS-aligned FinOps placeholder for Sportradar. Cost is governed by
  the bilateral data-licensing contract — typically a fixed annual fee plus
  variable components for matches, streams, or revenue share — rather than a
  per-API-call meter.
sources:
  - https://sportradar.com/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Sportradar AG
serviceCategory: Sports Data Licensing
billingModel:
  pricingCategory: Contact Sales
  billingFrequency: Per-Contract
  billingCurrency: USD (settlement varies)
  chargeCategories:
    - Purchase
focusColumns:
  ServiceName: Sportradar
  ServiceCategory: Sports Data
  ProviderName: Sportradar
  PublisherName: Sportradar AG
  InvoiceIssuerName: Sportradar AG
  BillingCurrency: USD
meters:
  - name: contracted_data_license
    description: Placeholder for the contracted data license; the actual billable
      unit (annual fee, per-match, per-stream, revenue share) varies by product
      and customer.
    unit: varies
    aggregation: sum
    dimensions:
      - sport
      - region
      - use_case
principles:
  - name: Visibility
    description: Visibility is provided through the customer portal and contract
      reporting deliverables. There is no public usage-API for cost extraction.
  - name: Allocation
    description: Costs are allocated against the licensing business unit
      (sportsbook, media product, league partner) named in the contract.
  - name: Optimization
    description: Optimization happens at contract renewal — scoping the right
      sport packages and feed depth for the use case rather than tuning request
      patterns.
  - name: Accountability
    description: Owned by the commercial / product owner that signs the
      sportsbook or media data agreement.
notes: No self-serve per-call billing surface; all commercial relationships are
  contracted.
maintainers:
  - FN: API Evangelist
    email: info@apievangelist.com
