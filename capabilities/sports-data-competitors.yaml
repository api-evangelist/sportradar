naftiko: 1.0.0-alpha2
info:
  label: Sportradar Sports Data API — Competitors
  description: 'Sportradar Sports Data API — Competitors. 1 operations. Lead operation: Get NBA Player Profile. Self-contained
    Naftiko capability covering one Sportradar business surface.'
  tags:
  - Sportradar
  - Competitors
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SPORTRADAR_API_KEY: SPORTRADAR_API_KEY
capability:
  consumes:
  - type: http
    namespace: sports-data-competitors
    baseUri: https://api.sportradar.com
    description: Sportradar Sports Data API — Competitors business capability. Self-contained, no shared references.
    resources:
    - name: nba-trial-v8-en-players-player_id-profile.json
      path: /nba/trial/v8/en/players/{player_id}/profile.json
      operations:
      - name: getnbaplayerprofile
        method: GET
        description: Get NBA Player Profile
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: player_id
          in: path
          type: string
          description: The unique Sportradar player identifier.
          required: true
    authentication:
      type: apikey
      key: api_key
      value: '{{env.SPORTRADAR_API_KEY}}'
      placement: query
  exposes:
  - type: rest
    namespace: sports-data-competitors-rest
    port: 8080
    description: REST adapter for Sportradar Sports Data API — Competitors. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/nba/trial/v8/en/players/{player-id}/profile-json
      name: nba-trial-v8-en-players-player-id-profile-json
      description: REST surface for nba-trial-v8-en-players-player_id-profile.json.
      operations:
      - method: GET
        name: getnbaplayerprofile
        description: Get NBA Player Profile
        call: sports-data-competitors.getnbaplayerprofile
        with:
          player_id: rest.player_id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: sports-data-competitors-mcp
    port: 9090
    transport: http
    description: MCP adapter for Sportradar Sports Data API — Competitors. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: get-nba-player-profile
      description: Get NBA Player Profile
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: sports-data-competitors.getnbaplayerprofile
      with:
        player_id: tools.player_id
      outputParameters:
      - type: object
        mapping: $.
