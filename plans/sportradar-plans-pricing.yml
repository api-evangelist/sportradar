description: Sportradar licenses sports data feeds, betting / iGaming services,
  AV streaming, and integrity products on bilateral B2B contracts. Pricing is
  not public; trial keys exist for some sport packages but production access is
  always quote-based and gated by use case (media, betting operator, league /
  federation).
sources:
  - https://sportradar.com/
  - https://docs.sportradar.com/
notes: No public pricing page; production licensing is contract-only and varies
  by sport, region, and use case (media, betting, integrity).
plans:
  - id: sportradar-contact-sales
    name: Contact Sales
    type: enterprise
    description: All commercial Sportradar data and managed-trading services are
      licensed via direct sales engagement. Trial / sandbox API keys may be
      available for evaluation but do not represent a published commercial tier.
    entries:
      - label: Custom License
        name: custom_license
        type: subscription
        metric: varies
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Sport-Specific Data Feeds
      - name: Live Odds / Managed Trading Services
      - name: AV Streaming Rights
      - name: Integrity Services
      - name: Negotiated SLA
