- aid: sportradar:nba-api
  name: Sportradar NBA API
  description: Provides comprehensive NBA data including real-time play-by-play, box
    scores, standings, team and player statistics, schedules, and injury reports.
    Covers both regular season and playoffs with live game feeds and historical data.
  humanURL: https://developer.sportradar.com/docs/read/basketball/NBA_v8
  tags:
  - Basketball
  - NBA
  - Real-Time
  - Sports
  properties:
  - type: Documentation
    url: https://developer.sportradar.com/docs/read/basketball/NBA_v8
- aid: sportradar:nfl-api
  name: Sportradar NFL API
  description: Delivers detailed NFL data including game summaries, play-by-play,
    drive charts, team and player statistics, schedules, standings, and depth charts.
    Supports live feeds and historical season data.
  humanURL: https://developer.sportradar.com/docs/read/american_football/NFL_v7
  tags:
  - American Football
  - NFL
  - Real-Time
  - Sports
  properties:
  - type: Documentation
    url: https://developer.sportradar.com/docs/read/american_football/NFL_v7
- aid: sportradar:soccer-api
  name: Sportradar Soccer API
  description: Covers 500+ soccer competitions globally, providing live match data,
    match timelines, team and player statistics, standings, tournament coverage, and
    detailed competition data for leagues like Premier League, La Liga, Bundesliga,
    Champions League, and more.
  humanURL: https://developer.sportradar.com/docs/read/soccer/Soccer_v4
  tags:
  - Real-Time
  - Soccer
  - Sports
  - Statistics
  properties:
  - type: Documentation
    url: https://developer.sportradar.com/docs/read/soccer/Soccer_v4
- aid: sportradar:odds-api
  name: Sportradar Odds API
  description: Provides pre-match and live odds comparison data from major sportsbooks
    worldwide, including opening lines, closing lines, and line movement history for
    sports betting applications and analytics platforms.
  humanURL: https://developer.sportradar.com/docs/read/odds_comparison/Odds_Comparison_v2
  tags:
  - Betting
  - Odds
  - Sports
  - Sportsbook
  properties:
  - type: Documentation
    url: https://developer.sportradar.com/docs/read/odds_comparison/Odds_Comparison_v2
- aid: sportradar:push-feeds-api
  name: Sportradar Push Feeds API
  description: Real-time streaming surface delivered over HTTP chunked transfer encoding
    for NFL, NBA, NHL, WNBA, and Soccer. Push Feeds emit JSON events, statistics,
    clock updates, and draft activity on a long-lived HTTP connection, with a five-second
    heartbeat when no new content is available. Push Feeds are available to Sportradar
    Realtime customers as an add-on to the RESTful Sports Data APIs and are intended
    to complement, not replace, the request/response APIs.
  humanURL: https://developer.sportradar.com/getting-started/docs/get-started
