apis:
- aid: sportradar:sports-data-api
  name: Sportradar Sports Data API
  description: Comprehensive sports data API providing real-time scores, statistics,
    odds, and content covering 80+ sports, 500+ leagues, and 750,000+ annual events
    in JSON and XML formats. Supports live score feeds, historical statistics, player
    and team profiles, schedules, standings, and odds comparison across markets.
  humanURL: https://developer.sportradar.com/
  tags:
  - Data
  - Real-Time
  - Sports
  - Statistics
