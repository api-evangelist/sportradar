aid: sportradar
name: Sportradar
description: Sportradar is the world's leading sports technology company, providing
  comprehensive sports data APIs delivering real-time scores, statistics, odds, and
  content for over 80 sports and 500 leagues worldwide. Their APIs serve media companies,
  sportsbooks, fantasy sports platforms, and sports technology companies with structured
  data covering NBA, NFL, MLB, NHL, soccer, tennis, golf, esports, and hundreds of
  other sports. Sportradar APIs use REST with API key authentication and deliver JSON
  and XML responses.
